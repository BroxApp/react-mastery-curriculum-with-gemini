<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS DOM Practice</title>
    <style>
        body { font-family: sans-serif; transition: background 0.3s; padding: 2rem; }
        .dark-theme { background-color: #1a1a1a; color: white; }
        .highlight-text { color: #61dafb; }
        .action-btn { 
            padding: 10px 20px; font-size: 1rem; cursor: pointer;
            background: #61dafb; border: none; border-radius: 5px; margin-bottom: 10px;
        }
        #item-list { margin-top: 20px; list-style: none; padding: 0; }
        .list-item { 
            background: #eee; color: #333; padding: 10px; 
            margin-bottom: 5px; border-radius: 4px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .delete-btn { background: #ff4d4d; color: white; border: none; cursor: pointer; border-radius: 3px; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1 id="main-title">Wait for Interaction...</h1>
    <button class="action-btn" id="theme-btn">Toggle Theme</button>

    <hr>
    <input type="text" id="item-input" placeholder="Type something...">
    <button id="add-btn">Add to List</button>
    <ul id="item-list"></ul>

    <!-- متصل کردن فایل جاوااسکریپت -->
    <script src="dom-practice.js"></script>
</body>
</html>
