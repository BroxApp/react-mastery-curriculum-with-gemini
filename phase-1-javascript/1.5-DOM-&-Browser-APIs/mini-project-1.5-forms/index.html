<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اپلیکیشن مدیریت یادداشت‌ها</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>📝 مینی پروژه: مدیریت یادداشت‌ها</h1>
        </header>

        <main>
            <section class="form-section">
                <form id="note-form" novalidate>
                    <div class="form-group">
                        <label for="note-title">عنوان یادداشت</label>
                        <input type="text" id="note-title" name="title" placeholder="عنوان را وارد کنید...">
                        <span class="error-message" id="title-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="note-content">محتوای یادداشت</label>
                        <textarea id="note-content" name="content" rows="4" placeholder="متن یادداشت را اینجا بنویسید..."></textarea>
                        <span class="error-message" id="content-error"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="note-category">دسته‌بندی</label>
                            <select id="note-category" name="category">
                                <option value="work">کاری</option>
                                <option value="personal">شخصی</option>
                                <option value="ideas">ایده‌ها</option>
                            </select>
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="note-important" name="isImportant">
                            <label for="note-important">⚠️ علامت‌گذاری به عنوان مهم</label>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn">ذخیره یادداشت</button>
                </form>
            </section>

            <section class="notes-section">
                <h2>یادداشت‌های شما</h2>
                <div id="notes-grid" class="notes-grid">
                    <p class="empty-message">هیچ یادداشتی یافت نشد. اولین یادداشت خود را اضافه کنید!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
